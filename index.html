<h2>Listado de Avisos</h2>

<div class="seccion">

  Buscar calle: <input type="text" id="fCalle" oninput="actualizar()" placeholder="Ej: Corrientes">

<button class="copiar-btn" onclick="copiarTablaImagen('tablaListado')">Copiar listado como imagen</button>
<table id="tablaListado"></table>

<div id="paginacion" style="text-align:center; margin-top:10px;"></div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1hbBJExZ_a0fFi8kTyKVNK_sZOy2B0bx2/gviz/tq?tqx=out:csv&gid=2142563319";

let data = [];
let filtro = { año: null, mes: null, fecha: null };

// PAGINACIÓN
let paginaActual = 1;
const registrosPorPagina = 50;

const mesesNombre = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

Papa.parse(URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    data = results.data;
    procesarFechas();
    generarAños();
    generarFiltrosListado();
    actualizar();
  }
});

function parseFecha(str) {
  if (!str) return null;
  if (str.includes("/")) {
    const [d,m,y] = str.split("/");
    return new Date(y, m-1, d);
  }
  return new Date(str);
}

function procesarFechas() {
  data.forEach(d => {
    const f = parseFecha(d.FECHA);
    if (!f || isNaN(f)) return;
    d._año = f.getFullYear();
    d._mes = f.getMonth() + 1;
    d._fecha = f.toISOString().split("T")[0];
  });
}

// ===== FUNCIÓN COPIAR IMAGEN =====
function copiarTablaImagen(idTabla) {
  const tabla = document.getElementById(idTabla);

  if (!tabla) {
    alert("No se encontró la tabla");
    return;
  }

  html2canvas(tabla, {
    backgroundColor: "#ffffff",
    scale: 2
  }).then(canvas => {
    canvas.toBlob(blob => {
      const item = new ClipboardItem({ "image/png": blob });

      navigator.clipboard.write([item])
        .then(() => alert("Tabla copiada como imagen ✅"))
        .catch(err => {
          console.error("Error al copiar:", err);
          alert("No se pudo copiar la imagen");
        });
    });
  });
}

// ===== FILTROS LISTADO =====
function generarFiltrosListado() {
  const estados = [...new Set(data.map(d => d.ESTADO).filter(Boolean))].sort();
  const zonas = [...new Set(data.map(d => d.ZONA).filter(Boolean))].sort();
  const comunas = [...new Set(data.map(d => d.COMUNA).filter(Boolean))].sort();

  const fEstado = document.getElementById("fEstado");
  const fZona = document.getElementById("fZona");
  const fComuna = document.getElementById("fComuna");

  fEstado.innerHTML = "<option value=''>Todos</option>";
  fZona.innerHTML = "<option value=''>Todas</option>";
  fComuna.innerHTML = "<option value=''>Todas</option>";

  estados.forEach(e => fEstado.innerHTML += `<option value="${e}">${e}</option>`);
  zonas.forEach(z => fZona.innerHTML += `<option value="${z}">${z}</option>`);
  comunas.forEach(c => fComuna.innerHTML += `<option value="${c}">${c}</option>`);
}
