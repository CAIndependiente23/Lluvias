<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Lluvias</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; background: #fff8cc; }
h1 { text-align: center; }
h2 { margin-top: 30px; }

button {
  margin: 4px; padding: 8px 14px;
  border: none; border-radius: 8px;
  background: #e0e0e0; cursor: pointer;
  font-weight: bold;
}
button:hover { background: #cfcfcf; }

.seccion {
  margin-top: 10px; padding: 10px;
  background: #ffffffaa; border-radius: 10px;
}

table {
  width: 100%; border-collapse: collapse;
  margin-top: 10px; background: white;
}

th { background: #007bff; color: white; padding: 10px; }
td { padding: 8px; text-align: center; }
tr:nth-child(even) { background: #f2f2f2; }

.copiar-btn { background: #28a745; color: white; }

.tabla-chica {
  width: 85%; margin: 0 auto;
}
</style>
</head>

<body>

<h1>Dashboard Lluvias</h1>

<div id="filtros">
  <div id="años" class="seccion"></div>
  <div id="meses" class="seccion"></div>
  <div id="fechas" class="seccion"></div>
</div>

<h2>Ingresos y Resueltos por Comuna</h2>
<button class="copiar-btn" onclick="copiarTablaImagen('tablaComuna')">Copiar como imagen</button>
<table id="tablaComuna" class="tabla-chica"></table>

<h2>Ingresos por Origen</h2>
<button class="copiar-btn" onclick="copiarTablaImagen('tablaOrigen')">Copiar como imagen</button>
<table id="tablaOrigen" class="tabla-chica"></table>

<h2>Listado de Avisos</h2>

<div class="seccion">
  Estado: <select id="fEstado" onchange="actualizar()"></select>
  Zona: <select id="fZona" onchange="actualizar()"></select>
  Comuna: <select id="fComuna" onchange="actualizar()"></select>
  <br><br>
  Buscar calle: <input type="text" id="fCalle" oninput="actualizar()">
</div>

<button class="copiar-btn" onclick="copiarTablaImagen('tablaListado')">Copiar listado como imagen</button>
<table id="tablaListado"></table>
<div id="paginacion" style="text-align:center; margin-top:10px;"></div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1hbBJExZ_a0fFi8kTyKVNK_sZOy2B0bx2/gviz/tq?tqx=out:csv&gid=2142563319";

let data = [];
let filtro = { año: null, mes: null, fecha: null };

let paginaActual = 1;
const registrosPorPagina = 50;

Papa.parse(URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    data = results.data;
    procesarFechas();
    generarAños();
    generarFiltrosListado();
    actualizar();
  }
});

function generarFiltrosListado() {
  const estados = [...new Set(data.map(d => d.ESTADO).filter(Boolean))].sort();
  const zonas = [...new Set(data.map(d => d.ZONA).filter(Boolean))].sort();
  const comunas = [...new Set(data.map(d => d.COMUNA).filter(Boolean))].sort();

  const fEstado = document.getElementById("fEstado");
  const fZona = document.getElementById("fZona");
  const fComuna = document.getElementById("fComuna");

  fEstado.innerHTML = "<option value=''>Todos</option>";
  fZona.innerHTML = "<option value=''>Todas</option>";
  fComuna.innerHTML = "<option value=''>Todas</option>";

  estados.forEach(e => fEstado.innerHTML += `<option value="${e}">${e}</option>`);
  zonas.forEach(z => fZona.innerHTML += `<option value="${z}">${z}</option>`);
  comunas.forEach(c => fComuna.innerHTML += `<option value="${c}">${c}</option>`);
}

function procesarFechas() {
  data.forEach(d => {
    if (!d.FECHA) return;
    const f = new Date(d.FECHA);
    if (isNaN(f)) return;
    d._año = f.getFullYear();
    d._mes = f.getMonth() + 1;
    d._fecha = f.toISOString().split("T")[0];
  });
}

function getFiltrado() {
  return data.filter(d =>
    (!filtro.año || d._año === filtro.año) &&
    (!filtro.mes || d._mes === filtro.mes) &&
    (!filtro.fecha || d._fecha === filtro.fecha)
  );
}

function renderTablaComuna(datos) {
  let r = {};
  datos.forEach(d=>{
    let c=d.COMUNA||"SIN DATO";
    if(!r[c]) r[c]={i:0,r:0};
    r[c].i++;
    if((d.ESTADO||"").includes("RESUELTO")) r[c].r++;
  });
  let html="<tr><th>Comuna</th><th>Ingresos</th><th>Resueltos</th><th>Pendientes</th></tr>";
  Object.keys(r).forEach(c=>{
    html+=`<tr><td>${c}</td><td>${r[c].i}</td><td>${r[c].r}</td><td>${r[c].i-r[c].r}</td></tr>`;
  });
  tablaComuna.innerHTML=html;
}

function renderTablaOrigen(datos) {
  let r={};
  datos.forEach(d=>{
    let o=d.ORIGEN||"SIN DATO";
    r[o]=(r[o]||0)+1;
  });
  let html="<tr><th>Origen</th><th>Ingresos</th></tr>";
  Object.keys(r).forEach(o=>{
    html+=`<tr><td>${o}</td><td>${r[o]}</td></tr>`;
  });
  tablaOrigen.innerHTML=html;
}

function renderTablaListado(datos) {
  const fEstado = document.getElementById("fEstado").value;
  const fZona = document.getElementById("fZona").value;
  const fComuna = document.getElementById("fComuna").value;
  const fCalle = document.getElementById("fCalle").value.toLowerCase();

  const filtrado = datos.filter(d =>
    (!fEstado || d.ESTADO === fEstado) &&
    (!fZona || d.ZONA === fZona) &&
    (!fComuna || d.COMUNA === fComuna) &&
    (!fCalle || (d.CALLE || "").toLowerCase().includes(fCalle))
  );

  const totalPaginas = Math.ceil(filtrado.length / registrosPorPagina);
  const inicio = (paginaActual - 1) * registrosPorPagina;
  const paginaDatos = filtrado.slice(inicio, inicio + registrosPorPagina);

  let html = "<tr><th>FECHA</th><th>HORA</th><th>ORIGEN</th><th>N AVISO</th><th>CALLE</th><th>ALTURA</th><th>INTERSECCIÓN</th><th>COMUNA</th><th>ZONA</th><th>ESTADO</th></tr>";

  paginaDatos.forEach(d=>{
    html+=`<tr>
      <td>${d.FECHA||""}</td>
      <td>${d["HORA DE INGRESO"]||""}</td>
      <td>${d.ORIGEN||""}</td>
      <td>${d["N DE AVISO"]||""}</td>
      <td>${d.CALLE||""}</td>
      <td>${d.ALTURA||""}</td>
      <td>${d.INTERSECCIÓN||""}</td>
      <td>${d.COMUNA||""}</td>
      <td>${d.ZONA||""}</td>
      <td>${d.ESTADO||""}</td>
    </tr>`;
  });

  tablaListado.innerHTML = html;

  paginacion.innerHTML = `
    <button onclick="cambiarPagina(${paginaActual-1})" ${paginaActual===1?"disabled":""}>◀</button>
    Página ${paginaActual} de ${totalPaginas||1}
    <button onclick="cambiarPagina(${paginaActual+1})" ${paginaActual===totalPaginas?"disabled":""}>▶</button>
  `;
}

function cambiarPagina(p){
  paginaActual = p;
  actualizarSinReset();
}

function actualizar(){
  paginaActual = 1;
  actualizarSinReset();
}

function actualizarSinReset(){
  const f = getFiltrado();
  renderTablaComuna(f);
  renderTablaOrigen(f);
  renderTablaListado(f);
}

</script>

</body>
</html>
