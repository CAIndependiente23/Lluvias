<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Lluvias</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #fff8cc;
}

h1 { text-align: center; }
h2 { margin-top: 30px; }

button {
  margin: 4px;
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  background: #e0e0e0;
  cursor: pointer;
  font-weight: bold;
}

button:hover { background: #cfcfcf; }

.seccion {
  margin-top: 10px;
  padding: 10px;
  background: #ffffffaa;
  border-radius: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background: #007bff;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  text-align: center;
}

tr:nth-child(even) { background: #f2f2f2; }

.copiar-btn {
  background: #28a745;
  color: white;
}
</style>
</head>

<body>

<h1>Dashboard Lluvias</h1>

<div id="filtros">
  <div id="años" class="seccion"></div>
  <div id="meses" class="seccion"></div>
  <div id="fechas" class="seccion"></div>
</div>

<h2>Ingresos y Resueltos por Comuna</h2>
<button class="copiar-btn" onclick="copiarTablaImagen('tablaComuna')">Copiar como imagen</button>
<table id="tablaComuna"></table>

<h2>Ingresos por Origen</h2>
<button class="copiar-btn" onclick="copiarTablaImagen('tablaOrigen')">Copiar como imagen</button>
<table id="tablaOrigen"></table>

<h2>Listado de Avisos</h2>

<div class="seccion">
  <b>Filtros:</b><br>
  Estado: <select id="fEstado" onchange="actualizar()"></select>
  Zona: <select id="fZona" onchange="actualizar()"></select>
  Comuna: <select id="fComuna" onchange="actualizar()"></select>
</div>

<button class="copiar-btn" onclick="copiarTablaImagen('tablaListado')">Copiar listado como imagen</button>
<table id="tablaListado"></table>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1hbBJExZ_a0fFi8kTyKVNK_sZOy2B0bx2/gviz/tq?tqx=out:csv&gid=2142563319";

let data = [];
let filtro = { año: null, mes: null, fecha: null };

const mesesNombre = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

Papa.parse(URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    data = results.data;
    procesarFechas();
    generarAños();
    generarFiltrosListado();
    actualizar();
  }
});

function parseFecha(str) {
  if (!str) return null;
  if (str.includes("/")) {
    const [d,m,y] = str.split("/");
    return new Date(y, m-1, d);
  }
  return new Date(str);
}

function procesarFechas() {
  data.forEach(d => {
    const f = parseFecha(d.FECHA);
    if (!f || isNaN(f)) return;
    d._año = f.getFullYear();
    d._mes = f.getMonth() + 1;
    d._fecha = f.toISOString().split("T")[0];
  });
}

// ===== FILTROS =====
function generarAños() {
  const cont = document.getElementById("años");
  cont.innerHTML = "<b>Año:</b> ";

  const años = [...new Set(data.map(d => d._año).filter(Boolean))].sort();

  const globalBtn = document.createElement("button");
  globalBtn.innerText = "GLOBAL";
  globalBtn.onclick = () => {
    filtro = { año: null, mes: null, fecha: null };
    limpiarNiveles();
    actualizar();
  };
  cont.appendChild(globalBtn);

  años.forEach(a => {
    const btn = document.createElement("button");
    btn.innerText = a;
    btn.onclick = () => {
      filtro = { año: a, mes: null, fecha: null };
      generarMeses();
      limpiarFechas();
      actualizar();
    };
    cont.appendChild(btn);
  });
}

function generarMeses() {
  const cont = document.getElementById("meses");
  cont.innerHTML = "<b>Mes:</b> ";

  const meses = [...new Set(
    data.filter(d => d._año === filtro.año).map(d => d._mes)
  )].sort((a,b)=>a-b);

  meses.forEach(m => {
    const btn = document.createElement("button");
    btn.innerText = mesesNombre[m-1];
    btn.onclick = () => {
      filtro.mes = m;
      filtro.fecha = null;
      generarFechas();
      actualizar();
    };
    cont.appendChild(btn);
  });
}

function generarFechas() {
  const cont = document.getElementById("fechas");
  cont.innerHTML = "<b>Fecha:</b> ";

  const fechas = [...new Set(
    data.filter(d =>
      d._año === filtro.año &&
      d._mes === filtro.mes
    ).map(d => d._fecha)
  )].sort();

  fechas.forEach(f => {
    const btn = document.createElement("button");
    btn.innerText = f;
    btn.onclick = () => {
      filtro.fecha = f;
      actualizar();
    };
    cont.appendChild(btn);
  });
}

function limpiarNiveles() {
  document.getElementById("meses").innerHTML = "";
  document.getElementById("fechas").innerHTML = "";
}

function limpiarFechas() {
  document.getElementById("fechas").innerHTML = "";
}

function getFiltrado() {
  return data.filter(d => {
    return (!filtro.año || d._año === filtro.año) &&
           (!filtro.mes || d._mes === filtro.mes) &&
           (!filtro.fecha || d._fecha === filtro.fecha);
  });
}

// ===== COPIAR COMO IMAGEN =====
async function copiarTablaImagen(id) {
  const tabla = document.getElementById(id);

  const canvas = await html2canvas(tabla, {
    backgroundColor: "#ffffff",
    scale: 2
  });

  canvas.toBlob(async function(blob) {
    try {
      await navigator.clipboard.write([
        new ClipboardItem({ "image/png": blob })
      ]);
      alert("Tabla copiada como imagen 📋");
    } catch (err) {
      alert("No se pudo copiar como imagen. Usá Chrome o Edge.");
    }
  });
}

// ===== TABLAS =====
function renderTablaComuna(datos) {
  let resumen = {};

  datos.forEach(d => {
    const c = d.COMUNA || "SIN DATO";
    const estado = (d.ESTADO || "").toUpperCase();

    if (!resumen[c]) resumen[c] = { i:0, r:0 };

    resumen[c].i++;
    if (estado.includes("RESUELTO")) resumen[c].r++;
  });

  let html = "<tr><th>Comuna</th><th>Ingresos</th><th>Resueltos</th><th>Pendientes</th></tr>";

  Object.keys(resumen).sort().forEach(c => {
    let ing = resumen[c].i;
    let res = resumen[c].r;

    html += `<tr>
      <td>${c}</td>
      <td>${ing}</td>
      <td>${res}</td>
      <td>${ing-res}</td>
    </tr>`;
  });

  document.getElementById("tablaComuna").innerHTML = html;
}

function renderTablaOrigen(datos) {
  let resumen = {};

  datos.forEach(d => {
    const o = d.ORIGEN || "SIN DATO";
    if (!resumen[o]) resumen[o]=0;
    resumen[o]++;
  });

  let html = "<tr><th>Origen</th><th>Ingresos</th></tr>";

  Object.keys(resumen).sort().forEach(o => {
    html += `<tr><td>${o}</td><td>${resumen[o]}</td></tr>`;
  });

  document.getElementById("tablaOrigen").innerHTML = html;
}

// ===== FILTROS LISTADO =====
function generarFiltrosListado() {
  generarSelect("fEstado", "ESTADO");
  generarSelect("fZona", "ZONA");
  generarSelect("fComuna", "COMUNA");
}

function generarSelect(id, campo) {
  const sel = document.getElementById(id);
  const valores = [...new Set(data.map(d => d[campo]).filter(Boolean))];

  sel.innerHTML = "<option value=''>Todos</option>";
  valores.forEach(v => {
    sel.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

// ===== TABLA LISTADO =====
function renderTablaListado(datos) {
  const fEstado = document.getElementById("fEstado").value;
  const fZona = document.getElementById("fZona").value;
  const fComuna = document.getElementById("fComuna").value;

  const filtrado = datos
    .filter(d =>
      (!fEstado || d.ESTADO === fEstado) &&
      (!fZona || d.ZONA === fZona) &&
      (!fComuna || d.COMUNA === fComuna)
    )
    .sort((a,b) => {
      const fa = new Date(a.FECHA + " " + (a["HORA DE INGRESO"] || "00:00"));
      const fb = new Date(b.FECHA + " " + (b["HORA DE INGRESO"] || "00:00"));
      return fb - fa;
    });

  let html = "<tr><th>FECHA</th><th>HORA</th><th>ORIGEN</th><th>N AVISO</th><th>CALLE</th><th>ALTURA</th><th>INTERSECCIÓN</th><th>COMUNA</th><th>ZONA</th><th>ESTADO</th></tr>";

  filtrado.forEach(d => {
    html += `<tr>
      <td>${d.FECHA||""}</td>
      <td>${d["HORA DE INGRESO"]||""}</td>
      <td>${d.ORIGEN||""}</td>
      <td>${d["N DE AVISO"]||""}</td>
      <td>${d.CALLE||""}</td>
      <td>${d.ALTURA||""}</td>
      <td>${d.INTERSECCIÓN||""}</td>
      <td>${d.COMUNA||""}</td>
      <td>${d.ZONA||""}</td>
      <td>${d.ESTADO||""}</td>
    </tr>`;
  });

  document.getElementById("tablaListado").innerHTML = html;
}

// ===== ACTUALIZAR =====
function actualizar() {
  const f = getFiltrado();
  renderTablaComuna(f);
  renderTablaOrigen(f);
  renderTablaListado(f);
}

</script>

</body>
</html>
