<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Ingresos</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

button {
  margin: 3px;
  padding: 6px 10px;
  cursor: pointer;
}

table {
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px 10px;
}

h2 { margin-top: 30px; }
</style>
</head>

<body>

<h1>Dashboard</h1>

<div id="filtros"></div>

<h2>Tabla 1: Ingresos y Resueltos por Comuna</h2>
<table id="tablaComuna"></table>

<h2>Tabla 2: Ingresos por Origen</h2>
<table id="tablaOrigen"></table>

<script>

// 🔴 PEGÁ ACÁ TU LINK CSV PUBLICADO
const URL = "PEGAR_LINK_CSV_AQUI";

let data = [];
let filtro = { año: null, mes: null, fecha: null };

// ===== PARSE CSV =====
Papa.parse(URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    data = results.data;
    procesarFechas();
  }
});

// ===== PARSE FECHA (ARGENTINA) =====
function parseFecha(fechaStr) {
  if (!fechaStr) return null;

  // formato dd/mm/yyyy
  if (fechaStr.includes("/")) {
    const [d, m, y] = fechaStr.split("/");
    return new Date(y, m - 1, d);
  }

  // fallback
  return new Date(fechaStr);
}

// ===== PROCESAR FECHAS =====
function procesarFechas() {
  data.forEach(d => {
    const f = parseFecha(d.FECHA);
    if (!f || isNaN(f)) return;

    d._año = f.getFullYear();
    d._mes = f.getMonth() + 1;
    d._fecha = f.toISOString().split("T")[0];
  });

  generarAños();
}

// ===== BOTONES =====
function generarAños() {
  const cont = document.getElementById("filtros");
  cont.innerHTML = "<b>Año:</b> ";

  const años = [...new Set(data.map(d => d._año).filter(Boolean))];

  años.forEach(a => {
    const btn = document.createElement("button");
    btn.innerText = a;
    btn.onclick = () => {
      filtro = { año: a, mes: null, fecha: null };
      generarMeses();
      actualizar();
    };
    cont.appendChild(btn);
  });
}

function generarMeses() {
  const cont = document.getElementById("filtros");

  const meses = [...new Set(
    data.filter(d => d._año === filtro.año).map(d => d._mes)
  )];

  cont.innerHTML += "<br><b>Mes:</b> ";

  meses.forEach(m => {
    const btn = document.createElement("button");
    btn.innerText = m;
    btn.onclick = () => {
      filtro.mes = m;
      filtro.fecha = null;
      generarFechas();
      actualizar();
    };
    cont.appendChild(btn);
  });
}

function generarFechas() {
  const cont = document.getElementById("filtros");

  const fechas = [...new Set(
    data.filter(d =>
      d._año === filtro.año &&
      d._mes === filtro.mes
    ).map(d => d._fecha)
  )];

  cont.innerHTML += "<br><b>Fecha:</b> ";

  fechas.forEach(f => {
    const btn = document.createElement("button");
    btn.innerText = f;
    btn.onclick = () => {
      filtro.fecha = f;
      actualizar();
    };
    cont.appendChild(btn);
  });
}

// ===== FILTRO =====
function getFiltrado() {
  return data.filter(d => {
    return (!filtro.año || d._año === filtro.año) &&
           (!filtro.mes || d._mes === filtro.mes) &&
           (!filtro.fecha || d._fecha === filtro.fecha);
  });
}

// ===== TABLA COMUNA =====
function tablaComuna(datos) {
  let resumen = {};

  datos.forEach(d => {
    const comuna = d.COMUNA || "SIN DATO";
    const estado = (d.ESTADO || "").toUpperCase();

    if (!resumen[comuna]) {
      resumen[comuna] = { ingresos: 0, resueltos: 0 };
    }

    resumen[comuna].ingresos++;

    if (estado.includes("RESUELTO")) {
      resumen[comuna].resueltos++;
    }
  });

  let html = "<tr><th>Comuna</th><th>Ingresos</th><th>Resueltos</th></tr>";

  for (let c in resumen) {
    html += `<tr>
      <td>${c}</td>
      <td>${resumen[c].ingresos}</td>
      <td>${resumen[c].resueltos}</td>
    </tr>`;
  }

  document.getElementById("tablaComuna").innerHTML = html;
}

// ===== TABLA ORIGEN =====
function tablaOrigen(datos) {
  let resumen = {};

  datos.forEach(d => {
    const origen = d.ORIGEN || "SIN DATO";

    if (!resumen[origen]) resumen[origen] = 0;
    resumen[origen]++;
  });

  let html = "<tr><th>Origen</th><th>Ingresos</th></tr>";

  for (let o in resumen) {
    html += `<tr>
      <td>${o}</td>
      <td>${resumen[o]}</td>
    </tr>`;
  }

  document.getElementById("tablaOrigen").innerHTML = html;
}

// ===== UPDATE =====
function actualizar() {
  const f = getFiltrado();
  tablaComuna(f);
  tablaOrigen(f);
}

</script>

</body>
</html>
