<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Lluvias</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #fff8cc;
}

h1 { text-align: center; }
h2 { margin-top: 30px; }

/* BOTONES */
button {
  margin: 4px;
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  background: #e0e0e0;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  background: #cfcfcf;
  transform: translateY(-1px);
}

button:active {
  transform: scale(0.95);
}

/* CONTENEDORES */
.seccion {
  margin-top: 10px;
  padding: 10px;
  background: #ffffffaa;
  border-radius: 10px;
}

/* TABLAS */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
}

th {
  background: #007bff;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  text-align: center;
}

tr:nth-child(even) { background: #f2f2f2; }
tr:hover { background: #e6f0ff; }

</style>
</head>

<body>

<h1>Dashboard Lluvias</h1>

<div id="filtros">
  <div id="años" class="seccion"></div>
  <div id="meses" class="seccion"></div>
  <div id="fechas" class="seccion"></div>
</div>

<h2>Ingresos y Resueltos por Comuna</h2>
<table id="tablaComuna"></table>

<h2>Ingresos por Origen</h2>
<table id="tablaOrigen"></table>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1hbBJExZ_a0fFi8kTyKVNK_sZOy2B0bx2/gviz/tq?tqx=out:csv&gid=2142563319";

let data = [];
let filtro = { año: null, mes: null, fecha: null };

const mesesNombre = [
  "Enero","Febrero","Marzo","Abril","Mayo","Junio",
  "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
];

Papa.parse(URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    data = results.data;
    procesarFechas();
    generarAños();
    actualizar();
  }
});

function parseFecha(str) {
  if (!str) return null;

  if (str.includes("/")) {
    const [d,m,y] = str.split("/");
    return new Date(y, m-1, d);
  }

  return new Date(str);
}

function procesarFechas() {
  data.forEach(d => {
    const f = parseFecha(d.FECHA);
    if (!f || isNaN(f)) return;

    d._año = f.getFullYear();
    d._mes = f.getMonth() + 1;
    d._fecha = f.toISOString().split("T")[0];
  });
}

function generarAños() {
  const cont = document.getElementById("años");
  cont.innerHTML = "<b>Año:</b> ";

  const años = [...new Set(data.map(d => d._año).filter(Boolean))].sort((a,b)=>a-b);

  const globalBtn = document.createElement("button");
  globalBtn.innerText = "GLOBAL";
  globalBtn.onclick = () => {
    filtro = { año: null, mes: null, fecha: null };
    limpiarNiveles();
    actualizar();
  };
  cont.appendChild(globalBtn);

  años.forEach(a => {
    const btn = document.createElement("button");
    btn.innerText = a;
    btn.onclick = () => {
      filtro = { año: a, mes: null, fecha: null };
      generarMeses();
      limpiarFechas();
      actualizar();
    };
    cont.appendChild(btn);
  });
}

function generarMeses() {
  const cont = document.getElementById("meses");
  cont.innerHTML = "<b>Mes:</b> ";

  const meses = [...new Set(
    data.filter(d => d._año === filtro.año).map(d => d._mes)
  )].sort((a,b)=>a-b);

  meses.forEach(m => {
    const btn = document.createElement("button");
    btn.innerText = mesesNombre[m-1];
    btn.onclick = () => {
      filtro.mes = m;
      filtro.fecha = null;
      generarFechas();
      actualizar();
    };
    cont.appendChild(btn);
  });
}

function generarFechas() {
  const cont = document.getElementById("fechas");
  cont.innerHTML = "<b>Fecha:</b> ";

  const fechas = [...new Set(
    data.filter(d =>
      d._año === filtro.año &&
      d._mes === filtro.mes
    ).map(d => d._fecha)
  )].sort();

  fechas.forEach(f => {
    const btn = document.createElement("button");
    btn.innerText = f;
    btn.onclick = () => {
      filtro.fecha = f;
      actualizar();
    };
    cont.appendChild(btn);
  });
}

function limpiarNiveles() {
  document.getElementById("meses").innerHTML = "";
  document.getElementById("fechas").innerHTML = "";
}

function limpiarFechas() {
  document.getElementById("fechas").innerHTML = "";
}

function getFiltrado() {
  return data.filter(d => {
    return (!filtro.año || d._año === filtro.año) &&
           (!filtro.mes || d._mes === filtro.mes) &&
           (!filtro.fecha || d._fecha === filtro.fecha);
  });
}

// ===== TABLA COMUNA =====
function tablaComuna(datos) {
  let resumen = {};

  datos.forEach(d => {
    const comuna = d.COMUNA || "SIN DATO";
    const estado = (d.ESTADO || "").toUpperCase();

    if (!resumen[comuna]) {
      resumen[comuna] = { ingresos: 0, resueltos: 0 };
    }

    resumen[comuna].ingresos++;

    if (estado.includes("RESUELTO")) {
      resumen[comuna].resueltos++;
    }
  });

  let html = "<tr><th>Comuna</th><th>Ingresos</th><th>Resueltos</th><th>Pendientes</th></tr>";

  Object.keys(resumen).sort().forEach(c => {
    const ing = resumen[c].ingresos;
    const res = resumen[c].resueltos;
    const pen = ing - res;

    html += `<tr>
      <td>${c}</td>
      <td>${ing}</td>
      <td>${res}</td>
      <td>${pen}</td>
    </tr>`;
  });

  document.getElementById("tablaComuna").innerHTML = html;
}

// ===== TABLA ORIGEN =====
function tablaOrigen(datos) {
  let resumen = {};

  datos.forEach(d => {
    const origen = d.ORIGEN || "SIN DATO";
    if (!resumen[origen]) resumen[origen] = 0;
    resumen[origen]++;
  });

  let html = "<tr><th>Origen</th><th>Ingresos</th></tr>";

  Object.keys(resumen).sort().forEach(o => {
    html += `<tr>
      <td>${o}</td>
      <td>${resumen[o]}</td>
    </tr>`;
  });

  document.getElementById("tablaOrigen").innerHTML = html;
}

function actualizar() {
  const f = getFiltrado();
  tablaComuna(f);
  tablaOrigen(f);
}

</script>

</body>
</html>
